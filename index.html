<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="记录每一杯酒的配方与当下的心情">

    <title>酒吧巡礼</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #16161d;
            --surface-elevated: #1e1e28;
            --accent: #ff6b6b;
            --accent-gradient: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            --accent2: #4ecdc4;
            --text: #f0f0f5;
            --text-secondary: #8a8a9a;
            --border: rgba(255,255,255,0.08);
            --success: #4ecdc4;
            --warning: #ffd93d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.5;
            height: 100%;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部安全区 */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* 页面切换动画 */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .page.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 顶部导航 */
        .nav-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--surface);
            color: var(--text);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* 统计卡片 */
        .stats-scroll {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .stats-scroll::-webkit-scrollbar { display: none; }
        .stat-pill {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 20px;
            min-width: 120px;
            text-align: center;
            flex-shrink: 0;
        }
        .stat-pill .value {
            font-size: 32px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-pill .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        /* 表单样式 */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin: 0 16px 16px;
            padding: 20px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group:last-child { margin-bottom: 0; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-input, .form-textarea {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,107,107,0.1);
        }
        .form-textarea { min-height: 100px; resize: vertical; }

        /* 心情选择器 */
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .mood-chip {
            padding: 10px 8px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .mood-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            transform: scale(1.05);
        }
        .mood-chip:active { transform: scale(0.95); }

        /* 星级评分 */
        .star-rating {
            display: flex;
            gap: 12px;
            font-size: 32px;
            padding: 4px 0;
        }
        .star {
            cursor: pointer;
            opacity: 0.25;
            transition: all 0.2s;
            filter: grayscale(1);
        }
        .star.active {
            opacity: 1;
            filter: grayscale(0);
            transform: scale(1.1);
        }
        .star:active { transform: scale(0.9); }

        /* 照片上传 */
        .photo-upload {
            width: 100%;
            height: 160px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        .photo-upload.has-image {
            border-style: solid;
            border-color: var(--accent);
        }
        .photo-upload input { display: none; }
        .photo-upload .upload-icon { font-size: 40px; margin-bottom: 8px; }
        .photo-upload .upload-text { font-size: 14px; color: var(--text-secondary); }
        .photo-preview {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
        }
        .photo-remove {
            position: absolute;
            top: 8px; right: 8px;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .photo-upload.has-image .photo-remove { display: flex; }

        /* 主按钮 */
        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--accent-gradient);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(255,107,107,0.3);
        }
        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(255,107,107,0.2);
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .btn-secondary:active { background: var(--surface-elevated); }

        /* 时间线 */
        .timeline-list { padding: 0 16px; }
        .timeline-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            position: relative;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .timeline-time {
            font-size: 12px;
            color: var(--accent2);
            font-weight: 700;
            background: rgba(78,205,196,0.1);
            padding: 4px 10px;
            border-radius: 8px;
        }
        .timeline-bar {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timeline-drink {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .timeline-drink strong { color: var(--text); }
        .timeline-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .tag {
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .tag-mood {
            background: rgba(255,107,107,0.12);
            color: var(--accent);
        }
        .tag-rating {
            background: rgba(255,217,61,0.12);
            color: var(--warning);
        }
        .timeline-note {
            font-size: 14px;
            color: var(--text-secondary);
            font-style: italic;
            padding: 10px;
            background: var(--bg);
            border-radius: 10px;
            border-left: 3px solid var(--accent);
        }
        .timeline-photo {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            margin-top: 12px;
        }
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .card-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .card-btn.delete { color: var(--accent); }
        .card-btn:active { background: var(--surface-elevated); }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 30px;
            color: var(--text-secondary);
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        .empty-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .empty-desc { font-size: 14px; line-height: 1.6; }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-item .icon { font-size: 24px; }
        .nav-item.active { color: var(--accent); }
        .nav-item:active { opacity: 0.7; }

        /* 历史页面 */
        .history-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .history-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .history-subtitle { font-size: 14px; color: var(--text-secondary); }

        .session-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 12px 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .session-card:active { transform: scale(0.98); }
        .session-date {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .session-stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 导出模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s;
        }
        .modal-overlay.active { display: flex; }
        .modal-sheet {
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
            animation: slideUp 0.3s ease;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 16px;
        }
        .export-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .export-btn {
            padding: 16px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .export-btn:active { background: var(--surface-elevated); }
        .export-btn .icon { font-size: 24px; }
        .export-preview {
            background: var(--bg);
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .export-preview pre {
            font-size: 11px;
            color: var(--accent2);
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'SF Mono', Monaco, monospace;
        }
        .modal-close {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--bg);
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--surface-elevated);
            color: var(--text);
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 安装提示 */
        .install-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--surface-elevated);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            z-index: 150;
            align-items: center;
            justify-content: space-between;
            animation: slideDown 0.3s ease;
        }
        .install-banner.show { display: flex; }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        .install-text { font-size: 14px; font-weight: 600; }
        .install-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 安装提示 -->
    <div class="install-banner" id="installBanner">
        <span class="install-text">📲 添加到主屏幕，像原生 App 一样使用</span>
        <button class="install-btn" onclick="installApp()">安装</button>
    </div>

    <!-- 首页：添加记录 -->
    <div class="page active" id="pageAdd">
        <div class="nav-header safe-top">
            <div class="nav-title">🍸 酒吧巡礼</div>
            <button class="nav-btn" onclick="showExportModal()">📤</button>
        </div>

        <div class="stats-scroll">
            <div class="stat-pill">
                <div class="value" id="statBars">0</div>
                <div class="label">今晚酒吧</div>
            </div>
            <div class="stat-pill">
                <div class="value" id="statDrinks">0</div>
                <div class="label">酒品记录</div>
            </div>
            <div class="stat-pill">
                <div class="value" id="statRating">-</div>
                <div class="label">平均评分</div>
            </div>
            <div class="stat-pill">
                <div class="value" id="statMood">🌙</div>
                <div class="label">当前状态</div>
            </div>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label class="form-label">🏠 酒吧名称</label>
                <input type="text" class="form-input" id="barName" placeholder="Speak Low、庙前冰室、Union Trading...">
            </div>

            <div class="form-group">
                <label class="form-label">🍸 酒品名称</label>
                <input type="text" class="form-input" id="drinkName" placeholder="Old Fashioned、Negroni、特调...">
            </div>

            <div class="form-group">
                <label class="form-label">🧪 配方 / 调制方式</label>
                <textarea class="form-textarea" id="recipe" placeholder="波本威士忌 60ml、苦精 2dash、方糖 1块，Stirred..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">📸 拍一张（可选）</label>
                <div class="photo-upload" id="photoUpload" onclick="document.getElementById('photoInput').click()">
                    <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(event)">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击拍照或选择照片</div>
                    <div class="photo-preview" id="photoPreview"></div>
                    <button class="photo-remove" id="photoRemove" onclick="event.stopPropagation(); removePhoto()">×</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">🎭 当下心情</label>
                <div class="mood-grid" id="moodGrid">
                    <div class="mood-chip" data-mood="微醺">微醺</div>
                    <div class="mood-chip" data-mood="放松">放松</div>
                    <div class="mood-chip" data-mood="兴奋">兴奋</div>
                    <div class="mood-chip" data-mood="沉思">沉思</div>
                    <div class="mood-chip" data-mood="社交">社交</div>
                    <div class="mood-chip" data-mood="孤独">孤独</div>
                    <div class="mood-chip" data-mood="浪漫">浪漫</div>
                    <div class="mood-chip" data-mood="怀旧">怀旧</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">⭐ 评分</label>
                <div class="star-rating" id="starRating">
                    <span class="star" data-val="1">⭐</span>
                    <span class="star" data-val="2">⭐</span>
                    <span class="star" data-val="3">⭐</span>
                    <span class="star" data-val="4">⭐</span>
                    <span class="star" data-val="5">⭐</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">📝 备注 / 氛围感受</label>
                <textarea class="form-textarea" id="note" placeholder="调酒师的手法、音乐、灯光、偶遇的人、当下的念头..."></textarea>
            </div>

            <button class="btn-primary" onclick="addEntry()">记录这一杯</button>
            <button class="btn-secondary" onclick="clearForm()">清空表单</button>
        </div>
    </div>

    <!-- 时间线页 -->
    <div class="page" id="pageTimeline">
        <div class="nav-header safe-top">
            <div class="nav-title">📜 今晚时间线</div>
            <button class="nav-btn" onclick="showExportModal()">📤</button>
        </div>
        <div id="timelineContent">
            <div class="empty-state">
                <div class="empty-icon">🌃</div>
                <div class="empty-title">今晚还没有记录</div>
                <div class="empty-desc">去第一家酒吧，点第一杯酒，<br>开始你的巡礼吧</div>
            </div>
        </div>
    </div>

    <!-- 历史页 -->
    <div class="page" id="pageHistory">
        <div class="history-header safe-top">
            <div class="history-title">📚 历史巡礼</div>
            <div class="history-subtitle">所有夜晚的酒吧记忆</div>
        </div>
        <div id="historyContent">
            <div class="empty-state">
                <div class="empty-icon">📖</div>
                <div class="empty-title">还没有历史记录</div>
                <div class="empty-desc">完成今晚的巡礼后，<br>记录会自动归档到这里</div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav safe-bottom">
        <button class="nav-item active" onclick="switchPage('pageAdd')">
            <span class="icon">✏️</span>
            <span>记录</span>
        </button>
        <button class="nav-item" onclick="switchPage('pageTimeline')">
            <span class="icon">📜</span>
            <span>时间线</span>
        </button>
        <button class="nav-item" onclick="switchPage('pageHistory')">
            <span class="icon">📚</span>
            <span>历史</span>
        </button>
    </div>

    <!-- 导出模态框 -->
    <div class="modal-overlay" id="exportModal" onclick="closeExportModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-title">📤 导出数据</div>
            <div class="export-options">
                <button class="export-btn" onclick="exportJSON()">
                    <span class="icon">📋</span>
                    <span>复制 JSON 数据</span>
                </button>
                <button class="export-btn" onclick="exportText()">
                    <span class="icon">📝</span>
                    <span>生成文字报告</span>
                </button>
                <button class="export-btn" onclick="exportImage()">
                    <span class="icon">🖼️</span>
                    <span>生成分享卡片（截图用）</span>
                </button>
            </div>
            <div class="export-preview" id="exportPreview" style="display:none;">
                <pre id="exportContent"></pre>
            </div>
            <button class="modal-close" onclick="closeExportModal()">关闭</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== 数据层 =====
        let sessions = JSON.parse(localStorage.getItem('barCrawlSessions') || '[]');
        let currentSession = JSON.parse(localStorage.getItem('barCrawlCurrent') || 'null');
        let selectedMood = '';
        let selectedRating = 0;
        let currentPhoto = null;
        let deferredPrompt = null;

        // 初始化当前会话
        if (!currentSession) {
            startNewSession();
        }

        function startNewSession() {
            currentSession = {
                id: Date.now(),
                date: new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }),
                entries: [],
                startTime: Date.now()
            };
            saveCurrent();
        }

        function saveCurrent() {
            localStorage.setItem('barCrawlCurrent', JSON.stringify(currentSession));
        }

        function saveAll() {
            localStorage.setItem('barCrawlSessions', JSON.stringify(sessions));
            saveCurrent();
        }

        // ===== UI 交互 =====
        // 心情选择
        document.getElementById('moodGrid').addEventListener('click', function(e) {
            if (e.target.classList.contains('mood-chip')) {
                document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
                if (selectedMood !== e.target.dataset.mood) {
                    e.target.classList.add('active');
                    selectedMood = e.target.dataset.mood;
                } else {
                    selectedMood = '';
                }
            }
        });

        // 星级评分
        document.getElementById('starRating').addEventListener('click', function(e) {
            if (e.target.classList.contains('star')) {
                const val = parseInt(e.target.dataset.val);
                selectedRating = selectedRating === val ? 0 : val;
                updateStars();
            }
        });

        function updateStars() {
            document.querySelectorAll('.star').forEach((s, i) => {
                s.classList.toggle('active', i < selectedRating);
            });
        }

        // 照片处理
        function handlePhoto(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                currentPhoto = evt.target.result;
                document.getElementById('photoPreview').style.backgroundImage = `url(${currentPhoto})`;
                document.getElementById('photoUpload').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        function removePhoto() {
            currentPhoto = null;
            document.getElementById('photoPreview').style.backgroundImage = '';
            document.getElementById('photoUpload').classList.remove('has-image');
            document.getElementById('photoInput').value = '';
        }

        // 添加记录
        function addEntry() {
            const bar = document.getElementById('barName').value.trim();
            const drink = document.getElementById('drinkName').value.trim();
            const recipe = document.getElementById('recipe').value.trim();
            const note = document.getElementById('note').value.trim();

            if (!bar || !drink) {
                showToast('请填写酒吧和酒品名称');
                return;
            }

            const entry = {
                id: Date.now(),
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                timestamp: Date.now(),
                bar,
                drink,
                recipe,
                mood: selectedMood || '',
                rating: selectedRating,
                note,
                photo: currentPhoto
            };

            currentSession.entries.unshift(entry);
            saveCurrent();

            clearForm();
            showToast('🍸 已记录！');
            updateStats();
            renderTimeline();

            // 震动反馈（如果支持）
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function clearForm() {
            document.getElementById('barName').value = '';
            document.getElementById('drinkName').value = '';
            document.getElementById('recipe').value = '';
            document.getElementById('note').value = '';
            document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
            selectedMood = '';
            selectedRating = 0;
            updateStars();
            removePhoto();
        }

        // 删除记录
        function deleteEntry(id) {
            if (!confirm('删除这条记录？')) return;
            currentSession.entries = currentSession.entries.filter(e => e.id !== id);
            saveCurrent();
            updateStats();
            renderTimeline();
            showToast('已删除');
        }

        // 统计更新
        function updateStats() {
            const uniqueBars = new Set(currentSession.entries.map(e => e.bar)).size;
            const totalDrinks = currentSession.entries.length;
            const rated = currentSession.entries.filter(e => e.rating > 0);
            const avgRating = rated.length > 0 ? (rated.reduce((a,b) => a + b.rating, 0) / rated.length).toFixed(1) : '-';

            document.getElementById('statBars').textContent = uniqueBars;
            document.getElementById('statDrinks').textContent = totalDrinks;
            document.getElementById('statRating').textContent = avgRating;

            // 根据最后一条记录的心情显示状态
            const lastMood = currentSession.entries[0]?.mood;
            document.getElementById('statMood').textContent = lastMood ? getMoodEmoji(lastMood) : '🌙';
        }

        function getMoodEmoji(mood) {
            const map = { '微醺':'😌', '放松':'😎', '兴奋':'🤩', '沉思':'🤔', '社交':'🥳', '孤独':'😶', '浪漫':'🥰', '怀旧':'🍂' };
            return map[mood] || '🌙';
        }

        // 渲染时间线
        function renderTimeline() {
            const container = document.getElementById('timelineContent');

            if (currentSession.entries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🌃</div>
                        <div class="empty-title">今晚还没有记录</div>
                        <div class="empty-desc">去第一家酒吧，点第一杯酒，<br>开始你的巡礼吧</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = currentSession.entries.map(entry => `
                <div class="timeline-card">
                    <div class="timeline-header">
                        <span class="timeline-time">${entry.time}</span>
                    </div>
                    <div class="timeline-bar">🏠 ${entry.bar} ${entry.rating > 0 ? '⭐'.repeat(entry.rating) : ''}</div>
                    <div class="timeline-drink">
                        <strong>🍸 ${entry.drink}</strong>
                        ${entry.recipe ? `<br>${entry.recipe}` : ''}
                    </div>
                    <div class="timeline-tags">
                        ${entry.mood ? `<span class="tag tag-mood">${getMoodEmoji(entry.mood)} ${entry.mood}</span>` : ''}
                        ${entry.rating > 0 ? `<span class="tag tag-rating">${'⭐'.repeat(entry.rating)} ${entry.rating}.0</span>` : ''}
                    </div>
                    ${entry.note ? `<div class="timeline-note">${entry.note}</div>` : ''}
                    ${entry.photo ? `<div class="timeline-photo" style="background-image:url(${entry.photo})"></div>` : ''}
                    <div class="card-actions">
                        <button class="card-btn" onclick="shareEntry(${entry.id})">📤 分享</button>
                        <button class="card-btn delete" onclick="deleteEntry(${entry.id})">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 渲染历史
        function renderHistory() {
            const container = document.getElementById('historyContent');
            const allSessions = [...sessions];

            // 如果当前会话有记录且不是今天开始的，也加入历史
            if (currentSession.entries.length > 0) {
                // 检查是否已归档
                const exists = allSessions.some(s => s.id === currentSession.id);
                if (!exists) {
                    // 自动归档到历史（如果超过6小时或手动结束）
                }
            }

            if (allSessions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📖</div>
                        <div class="empty-title">还没有历史记录</div>
                        <div class="empty-desc">完成今晚的巡礼后，<br>记录会自动归档到这里</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = allSessions.map(session => {
                const uniqueBars = new Set(session.entries.map(e => e.bar)).size;
                const avgRating = session.entries.filter(e => e.rating > 0).length > 0
                    ? (session.entries.filter(e => e.rating > 0).reduce((a,b) => a + b.rating, 0) / session.entries.filter(e => e.rating > 0).length).toFixed(1)
                    : '-';
                return `
                    <div class="session-card" onclick="loadSession(${session.id})">
                        <div class="session-date">${session.date}</div>
                        <div class="session-stats">
                            <span>🏠 ${uniqueBars} 家酒吧</span>
                            <span>🍸 ${session.entries.length} 杯</span>
                            <span>⭐ ${avgRating} 均分</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 页面切换
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (pageId === 'pageTimeline') renderTimeline();
            if (pageId === 'pageHistory') renderHistory();
            window.scrollTo(0, 0);
        }

        // 导出功能
        function showExportModal() {
            document.getElementById('exportModal').classList.add('active');
            document.getElementById('exportPreview').style.display = 'none';
        }

        function closeExportModal(e) {
            if (!e || e.target === document.getElementById('exportModal')) {
                document.getElementById('exportModal').classList.remove('active');
            }
        }

        function exportJSON() {
            const data = JSON.stringify({ current: currentSession, history: sessions }, null, 2);
            document.getElementById('exportContent').textContent = data;
            document.getElementById('exportPreview').style.display = 'block';
            copyToClipboard(data);
            showToast('📋 JSON 已复制到剪贴板');
        }

        function exportText() {
            let text = `🍸 酒吧巡礼报告\n${currentSession.date}\n${'='.repeat(20)}\n\n`;
            currentSession.entries.forEach((e, i) => {
                text += `${i+1}. ${e.time} @ ${e.bar}\n`;
                text += `   🍸 ${e.drink}\n`;
                if (e.recipe) text += `   🧪 ${e.recipe}\n`;
                if (e.mood) text += `   🎭 ${e.mood}\n`;
                if (e.rating) text += `   ⭐ ${e.rating}/5\n`;
                if (e.note) text += `   📝 ${e.note}\n`;
                text += `\n`;
            });
            document.getElementById('exportContent').textContent = text;
            document.getElementById('exportPreview').style.display = 'block';
            copyToClipboard(text);
            showToast('📝 文字报告已复制');
        }

        function exportImage() {
            showToast('🖼️ 请用系统截图功能保存当前画面');
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        function shareEntry(id) {
            const entry = currentSession.entries.find(e => e.id === id);
            if (!entry) return;
            const text = `🍸 ${entry.drink} @ ${entry.bar}\n${entry.mood ? '🎭 ' + entry.mood + '\n' : ''}${entry.rating ? '⭐ ' + entry.rating + '/5\n' : ''}${entry.note ? '📝 ' + entry.note : ''}`;
            copyToClipboard(text);
            showToast('📋 已复制分享文案');
        }

        // Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // PWA 安装
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choice) => {
                    if (choice.outcome === 'accepted') {
                        showToast('✅ 已添加到主屏幕');
                    }
                    deferredPrompt = null;
                    document.getElementById('installBanner').classList.remove('show');
                });
            } else {
                showToast('请用浏览器菜单「添加到主屏幕」');
            }
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW注册失败:', err));
        }

        // 初始化
        updateStats();
        renderTimeline();
    </script>
</body>
</html>
